# Kamal deploy config for cube-worlds-bot — single Node container: grammY
# Telegram bot (webhook mode) + Fastify HTTP server + Vue Mini App served at /.
# Stateful: MongoDB (shared platform mongo, DB cube-worlds-bot) + 488M of per-NFT assets
# on the host volume /srv/cube_worlds/data (mounted /usr/src/data).
# Lift-and-shift of production main @ 8a53660 (apex cubeworlds.club, apex-only).
# Build context is the repo root (Dockerfile builds src/frontend + runs via tsx).
# Deployed from branch `deploy/kamal-scaffold`.
# Redeploy fence: .kamal/hooks/pre-app-boot stops the old container BEFORE the
# new one boots (the tx-loop must never run twice — double-mint hazard). The
# ~10-30s downtime per deploy is intended; --skip-hooks re-creates the hazard.

service: cube-worlds-bot
image:   chiliec/cube-worlds-bot     # GHCR: composed to ghcr.io/chiliec/cube-worlds-bot via registry.server

servers:
  web:
    hosts:
      - 5.223.75.86               # axveer VPS public IPv4; IP (not host) so SSH works before DNS cutover

ssh:
  user: deploy
  port: 666

proxy:
  hosts:
    - cubeworlds.club             # apex only (cnfts being dropped; www stays on legacy)
  app_port: 80                    # matches EXPOSE 80 / BOT_SERVER_PORT default
  ssl: true
  healthcheck:
    path: /                       # Fastify serves the Vue index.html (200) at /.
                                  # NOTE (Phase C): the app calls mongoose.connect at boot and
                                  # only listens after it resolves — so it cannot become healthy
                                  # until it can reach `mongo` on platform_net. The post-deploy
                                  # hook attaches platform_net only AFTER deploy, so first
                                  # `kamal setup` will deadlock unless the boot-ordering is
                                  # solved first (see runbook §8 Phase C blocker).

# MongoDB DB `cube-worlds-bot` (renamed from legacy `nft-bot`) lives in the shared
# platform mongo (not here). The 488M of
# per-NFT generated assets (681 dirs of <id>.png/.json/.jpg) persist on this
# host volume across deploys; pre-seeded from legacy in Phase C (/srv/<app> convention).
volumes:
  - "/srv/cube_worlds/data:/usr/src/data"

env:
  clear:
    NODE_ENV: production
    LOG_LEVEL: info
    BOT_MODE: webhook
    BOT_NAME: cube_worlds_bot
    BOT_SERVER_HOST: 0.0.0.0       # bind all interfaces so kamal-proxy can reach the container
    BOT_SERVER_PORT: 80
    BOT_ADMINS: "[38968897,436918016,119470668]"
    WEB_APP_URL: https://cubeworlds.club            # unchanged domain → TonConnect manifest / Mini App URL stay valid
    COLLECTION_ADDRESS: EQB39CGp65rFLHqWW2jiob_1Xp74Sm6kqmMQWDIxQSRPPLcY
    COLLECTION_OWNER: UQDSqdhnwMllRlp0EqB4asBQiGhNWNa-9S4hPSVONLfr0WF3
    PINATA_GATEWAY: https://tan-above-limpet-868.mypinata.cloud
    TESTNET: "false"              # mainnet in prod (config default is true — must override)
    TELEMETREE_PROJECT_ID: eda52fec-d310-43b5-a401-fb0d56e59708
  secret:                         # decrypted from SOPS via .kamal/secrets (Phase B)
    - MONGO                       # full URI incl. app-user creds (axveer mongo requires auth)
    - BOT_TOKEN
    - BOT_WEBHOOK                 # https://cubeworlds.club/<BOT_TOKEN> — token-in-path webhook
    - MNEMONICS                   # TON collection-owner wallet seed — highest sensitivity
    - PINATA_API_KEY
    - PINATA_API_SECRET
    - PINATA_GATEWAY_KEY
    - TONCENTER_API_KEY
    - STABILITY_API_KEY
    - OPENAI_API_KEY
    - TELEMETREE_API_KEY
    - TAPPADS_SECRET_URL

registry:
  server: ghcr.io                 # GitHub Container Registry
  username: chiliec
  password:
    - KAMAL_REGISTRY_PASSWORD     # GHCR PAT (classic) write:packages — SOPS shared.enc.yaml docker_registry_password

builder:
  arch: amd64
  remote: ssh://axveer-builder   # build on vpn-amnezia, not the laptop. Bare alias:
  local: false                   # user/port fall back to ssh: above (deploy/666) +
                                 # ~/.ssh/config axveer-builder host. See infra
                                 # docs/runbook-remote-builder.md.
